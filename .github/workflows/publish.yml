name: Publish Release

on:
  release:
    types: [ created ]

jobs:
  getrelease:
    runs-on: ubuntu-latest
    outputs:
      upload-url: ${{ steps.getrelease.outputs.UPLOAD_URL }}
    steps:
    - name: Get release
      id: getrelease
      run: |
        echo "Getting release for tag: $GITHUB_REF_NAME"
        RELEASE_RESPONSE=$(curl -Ls \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/vnd.github+json" \
          "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")
        RELEASE_ID=$(echo $RELEASE_RESPONSE | grep -oP '"id":\s?\K\d+' | head -n 1)
        UPLOAD_URL=$(echo $RELEASE_RESPONSE | grep -oP '"upload_url": "\K[^"]+' | sed -e "s/{?name,label}//")
        echo "Release ID: $RELEASE_ID"
        echo "Upload URL: $UPLOAD_URL"
        echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_OUTPUT
  publish:
    runs-on: ubuntu-latest
    needs: [getrelease]
    strategy:
      matrix:
        self-contained: [false, true]
        target: ["win-x64", "linux-x64", "osx-x64", "osx-arm64"]
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Setup
      run: |
        NAME="${{ matrix.target }}$( [ "${{ matrix.self-contained }}" = "true" ] && echo "-sc" || echo "" )"
        echo "NAME=$NAME" >> $GITHUB_ENV
    - name: Publish
      run: |
        FILENAME="$NAME.zip"
        echo "Building $FILENAME"
        dotnet publish -c Release -r ${{ matrix.target }} --self-contained "${{ matrix.self-contained }}" -p:PublishSingleFile=true -p:Version=${GITHUB_REF_NAME:1} -o publish/$NAME src/BitJuice.Backup/BitJuice.Backup.csproj
        cd publish/$NAME
        zip -r ../$FILENAME ./*
    - name: Upload
      run: |
        FILENAME="$NAME.zip"
        echo "Uploading $FILENAME"
        curl -L \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @"publish/$FILENAME" \
          "${{ needs.getrelease.outputs.upload-url }}?name=$FILENAME"
  docker:
    runs-on: ubuntu-latest
    needs: [getrelease]
    env:
      IMAGE_BASE_TAG: jaroslawdutka/bitjuice-backup
      
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Set tags
      id: tags
      run: |
        echo 'latest_tag=${{ env.IMAGE_BASE_TAG }}:latest' >> $GITHUB_OUTPUT
        echo 'version_tag=${{ env.IMAGE_BASE_TAG }}:${GITHUB_REF_NAME:1}' >> $GITHUB_OUTPUT
      
    - name: Docker login
      run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_PASSWORD }}
      
    - name: Docker build
      run: |
        docker build -t ${{ steps.tags.outputs.version_tag }} .
        docker tag ${{ steps.tags.outputs.version_tag }} ${{ steps.tags.outputs.latest_tag }}

    - name: Docker push
      run: |
        docker push ${{ steps.tags.outputs.version_tag }}
        docker push ${{ steps.tags.outputs.latest_tag }}

    - name: Docker logout
      if: always()
      run: docker logout
